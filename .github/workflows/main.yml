name: CI Pipeline - cinema

on: 
  push:
    branches: [main]
  pull_request: 
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{runner.os}}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{runner.os}}-maven-
      - run: mvn clean package -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: cinema-jar
          path: target/*.jar

  test:
    runs-on: ubuntu-latest
    needs: build
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        # Configurazione robusta suggerita dal prof
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root --password=testpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{runner.os}}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{runner.os}}-maven-
      
      # Passaggio aggiunto per attendere il DB
      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -P 3306 -u root --password=testpassword --silent; do
            echo "Waiting for MySQL..."
            sleep 3
          done
          
      - run: mvn test
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/testdb
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: testpassword
          
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/
